# ============================================================
# SYSTIC-CI — Docker Compose DEV
# Uniquement l'infrastructure (Postgres + Redis)
# Le frontend et l'API tournent en dehors via npm run dev
# ============================================================

version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: systic_pg_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: systic_ci
      POSTGRES_USER: systic_user
      POSTGRES_PASSWORD: systic_pass_dev
    ports:
      - "5432:5432"
    volumes:
      - systic_pg_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U systic_user -d systic_ci"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: systic_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: systic_adminer_dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha
    depends_on:
      - postgres

volumes:
  systic_pg_dev_data:

# ================================================================
# NGINX — SYSTIC-CI Platform Configuration
# ================================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=web:10m rate=100r/m;

# Upstream servers
upstream systic_api {
    server api:3001;
    keepalive 32;
}

upstream systic_web {
    server web:3000;
    keepalive 16;
}

# ===== HTTP → HTTPS redirect =====
server {
    listen 80;
    server_name systic.ci www.systic.ci api.systic.ci;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ===== MAIN WEBSITE =====
server {
    listen 443 ssl http2;
    server_name systic.ci www.systic.ci;

    # SSL
    ssl_certificate /etc/nginx/ssl/systic.ci.crt;
    ssl_certificate_key /etc/nginx/ssl/systic.ci.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Rate limiting
    limit_req zone=web burst=20 nodelay;

    # Static files cache
    location /_next/static/ {
        proxy_pass http://systic_web;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_cache_valid 200 1y;
    }

    location /fonts/ {
        proxy_pass http://systic_web;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Proxy to Next.js
    location / {
        proxy_pass http://systic_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}

# ===== API =====
server {
    listen 443 ssl http2;
    server_name api.systic.ci;

    ssl_certificate /etc/nginx/ssl/systic.ci.crt;
    ssl_certificate_key /etc/nginx/ssl/systic.ci.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Client body size (for uploads)
    client_max_body_size 50M;

    # API rate limiting
    location /api/v1/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://systic_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://systic_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # WebSockets (Socket.IO)
    location /socket.io/ {
        proxy_pass http://systic_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }
}

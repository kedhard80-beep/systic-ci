version: "3.9"

# ================================================================
# SYSTIC-CI Platform — Docker Compose (Production-ready)
# ================================================================

networks:
  systic-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local
  uploads:
    driver: local
  backups:
    driver: local

services:

  # ===== POSTGRESQL =====
  postgres:
    image: postgres:16-alpine
    container_name: systic_postgres
    restart: unless-stopped
    networks:
      - systic-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-systic_db}
      POSTGRES_USER: ${POSTGRES_USER:-systic_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-systic_user} -d ${POSTGRES_DB:-systic_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ===== REDIS =====
  redis:
    image: redis:7-alpine
    container_name: systic_redis
    restart: unless-stopped
    networks:
      - systic-network
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/etc/redis/redis.conf:ro
    command: redis-server /etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--auth", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ===== API (NestJS) =====
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      target: production
    container_name: systic_api
    restart: unless-stopped
    networks:
      - systic-network
    volumes:
      - uploads:/app/uploads
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      FRONTEND_URL: ${FRONTEND_URL}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@systic.ci}
      SENTRY_DSN: ${SENTRY_DSN}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-systic-ci}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"
      replicas: 1

  # ===== WEB (Next.js) =====
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      target: production
    container_name: systic_web
    restart: unless-stopped
    networks:
      - systic-network
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_URL:-https://api.systic.ci}
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  # ===== NGINX (Reverse Proxy) =====
  nginx:
    image: nginx:alpine
    container_name: systic_nginx
    restart: unless-stopped
    networks:
      - systic-network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites/:/etc/nginx/conf.d/:ro
      - ./nginx/ssl/:/etc/nginx/ssl/:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - web
      - api
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M

  # ===== ADMINER (DB GUI — dev only) =====
  adminer:
    image: adminer:latest
    container_name: systic_adminer
    restart: unless-stopped
    networks:
      - systic-network
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha
    profiles: ["dev"]
    depends_on:
      - postgres

  # ===== REDIS INSIGHT (dev only) =====
  redis-insight:
    image: redislabs/redisinsight:latest
    container_name: systic_redis_insight
    restart: unless-stopped
    networks:
      - systic-network
    ports:
      - "127.0.0.1:8001:8001"
    profiles: ["dev"]
    depends_on:
      - redis

  # ===== BACKUP SERVICE =====
  backup:
    image: postgres:16-alpine
    container_name: systic_backup
    networks:
      - systic-network
    volumes:
      - backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGHOST: postgres
    command: >
      sh -c "crond -f -d 8"
    entrypoint: []
    depends_on:
      - postgres
    profiles: ["prod"]

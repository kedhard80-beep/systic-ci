name: SYSTIC-CI Platform — CI/CD Pipeline

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ===================================================================
  # ÉTAPE 1 — Qualité du code (lint + type-check)
  # ===================================================================
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --workspace=apps/api --workspace=apps/web --workspace=packages/database

      - name: Lint API
        run: npm run lint --workspace=apps/api
        continue-on-error: false

      - name: Lint Web
        run: npm run lint --workspace=apps/web
        continue-on-error: false

      - name: Type check API
        run: npm run type-check --workspace=apps/api

      - name: Type check Web
        run: npm run type-check --workspace=apps/web

  # ===================================================================
  # ÉTAPE 2 — Audit de sécurité
  # ===================================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit API dependencies
        run: npm audit --audit-level=high --workspace=apps/api
        continue-on-error: true

      - name: Audit Web dependencies
        run: npm audit --audit-level=high --workspace=apps/web
        continue-on-error: true

      - name: Run Trivy vulnerability scan (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
        continue-on-error: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
        continue-on-error: true

  # ===================================================================
  # ÉTAPE 3 — Tests unitaires Jest (API)
  # ===================================================================
  test-unit:
    name: Unit Tests (Jest)
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: systic_test
          POSTGRES_USER: systic_test
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://systic_test:test_password@localhost:5432/systic_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-minimum-32-characters-long
      JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --workspace=apps/api --workspace=packages/database

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: packages/database
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Copy Prisma client to API
        run: cp -r packages/database/node_modules/.prisma/client apps/api/node_modules/.prisma/

      - name: Run DB migrations
        run: npx prisma migrate deploy
        working-directory: packages/database
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run unit tests with coverage
        run: npm test -- --coverage --forceExit --passWithNoTests
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: apps/api/coverage
          flags: unit
        continue-on-error: true

  # ===================================================================
  # ÉTAPE 4 — Tests E2E Playwright (Frontend)
  # ===================================================================
  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: systic_e2e
          POSTGRES_USER: systic_e2e
          POSTGRES_PASSWORD: e2e_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://systic_e2e:e2e_password@localhost:5432/systic_e2e
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      JWT_SECRET: e2e-jwt-secret-minimum-32-characters-long
      JWT_REFRESH_SECRET: e2e-refresh-secret-minimum-32-chars
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client & migrate
        run: |
          npx prisma generate
          npx prisma migrate deploy
        working-directory: packages/database
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Seed E2E database
        run: npx ts-node prisma/seed.ts
        working-directory: packages/database
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Build API
        run: npm run build --workspace=apps/api

      - name: Start API in background
        run: |
          npm run start:prod --workspace=apps/api &
          npx wait-on http://localhost:4000/api/v1/health --timeout 30000
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          PORT: 4000

      - name: Build Next.js
        run: npm run build --workspace=apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright E2E tests
        run: npx playwright test --reporter=github
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # ===================================================================
  # ÉTAPE 5 — Build des images Docker
  # ===================================================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-unit]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [web, api]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}:latest"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL"
        continue-on-error: true

  # ===================================================================
  # ÉTAPE 6 — Déploiement Staging
  # ===================================================================
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.systic.ci

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/systic-platform
            echo "📦 Pulling latest images..."
            docker compose -f docker/docker-compose.yml pull
            echo "🚀 Deploying services..."
            docker compose -f docker/docker-compose.yml up -d --remove-orphans
            echo "🗃️  Running migrations..."
            docker compose -f docker/docker-compose.yml exec -T api npx prisma migrate deploy
            echo "🧹 Pruning old images..."
            docker system prune -f
            echo "✅ Staging deployment complete"

  # ===================================================================
  # ÉTAPE 7 — Déploiement Production (manuel requis)
  # ===================================================================
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://systic.ci

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script: |
            set -e
            cd /opt/systic-platform
            echo "📦 Pulling latest images..."
            docker compose -f docker/docker-compose.yml pull
            echo "🚀 Deploying services (rolling update)..."
            docker compose -f docker/docker-compose.yml up -d --remove-orphans --no-build
            echo "🗃️  Running migrations..."
            docker compose -f docker/docker-compose.yml exec -T api npx prisma migrate deploy
            echo "🔍 Health check..."
            sleep 10
            curl -f https://api.systic.ci/api/v1/health || exit 1
            echo "🧹 Pruning old images..."
            docker system prune -f
            echo "✅ Production deployment complete — $(date)"

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "✅ SYSTIC-CI Production deployed!",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "🚀 *SYSTIC-CI* — Déploiement production réussi!\n*Commit:* `${{ github.sha }}`\n*Auteur:* ${{ github.actor }}\n*Message:* ${{ github.event.head_commit.message }}"
                }
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "❌ SYSTIC-CI Production deployment FAILED",
              "blocks": [{
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "🚨 *SYSTIC-CI* — Déploiement production ÉCHOUÉ!\n*Commit:* `${{ github.sha }}`\n*Auteur:* ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Voir les logs>"
                }
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
